# ===================================================================
# DEFAULT CONFIG (Applies to ALL profiles unless overridden)
# ===================================================================
spring:
  application:
    name: edusync
  cache:
    type: redis
    redis:
      time-to-live: 60s
      cache-null-values: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 500ms
  profiles:
    active: dev
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:no-reply@shikshaintelligence.com}

  # --- JPA / Hibernate Common Settings ---
  jpa:
    hibernate:
      # SECURITY FIX: Changed from 'update' to 'validate' as a safe default.
      # 'update' can silently alter/corrupt the schema in production.
      # Profile-specific overrides are defined below.
      ddl-auto: validate
    # SECURITY FIX: Disabled by default to prevent SQL query leakage in logs.
    # Enabled only in the 'dev' profile override below.
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Keep baseline opt-in by default for safety in existing environments.
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}

# ===================================================================
# APPLICATION-SPECIFIC PROPERTIES
# ===================================================================
app:
  cache:
    version: ${APP_CACHE_VERSION:v1}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expirationTime: ${JWT_EXPIRATION_TIME}
    refresh-expirationTime: ${REFRESH_EXPIRATION_TIME}
    password-reset-expirationTime: ${PASSWORD_RESET_TIME}

  frontend:
    url: ${APP_FRONTEND_URL}

  # SECURITY FIX: Moved from root 'security' namespace to 'app.security'
  # to avoid conflict with Spring Security's reserved property namespace.
  security:
    max-devices: 2

  hrms:
    payroll:
      attendance:
        # Finalized policy options: TREAT_UNMARKED_AS_ABSENT, MARKED_ONLY, FAIL_ON_PARTIAL
        partial-mark-policy: ${HRMS_PAYROLL_ATTENDANCE_POLICY:TREAT_UNMARKED_AS_ABSENT}

  media:
    provider: ${MEDIA_PROVIDER:cloudinary}
    max-file-size-bytes: ${MEDIA_MAX_FILE_SIZE_BYTES:5242880}
    upload-init-ttl-seconds: ${MEDIA_UPLOAD_INIT_TTL_SECONDS:300}
    allowed-content-types: ${MEDIA_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
    allowed-secure-url-prefixes: ${MEDIA_ALLOWED_SECURE_URL_PREFIXES:https://res.cloudinary.com/}
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}
      folder: ${CLOUDINARY_UPLOAD_FOLDER:profiles}
    s3:
      upload-url-template: ${S3_UPLOAD_URL_TEMPLATE:}

# NOTE: 'api.url' is kept at the root namespace as it is referenced
# directly via @RequestMapping("${api.url}/...") across all controllers.
api:
  url: ${BASE_URL}${API_VERSION}

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:Htrihaonlnlsafnirn1239u129#2381$}


logging:
  # Log file path — read by logback-spring.xml via <springProperty source="logging.file.name"/>
  # Also used by the SuperAdmin /api/v1/super/logs tail endpoint .
  file:
    name: ${LOG_FILE_NAME:logs/edusync-dev.log}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, metrics, loggers, httpexchanges, scheduledtasks
  endpoint:
    health:
      show-details: always
    httpexchanges:
      enabled: true
  httpexchanges:
    recording:
      enabled: true
  info:
    git:
      mode: full
    build:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      financeDashboard:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 300ms
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5

---
# ===================================================================
# DEVELOPMENT PROFILE (Active when spring.profiles.active=dev)
# ===================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}?prepareThreshold=0
    username: ${DB_USER}
    password: ${DB_PASS}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 40
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      keepalive-time: 30000
      auto-commit: false

  jpa:
    # Migration-first mode: validate schema against entities.
    hibernate:
      ddl-auto: validate
    # Enabled only in dev for debugging SQL queries.
    show-sql: true
  flyway:
    # Dev can bootstrap on existing local schemas without manual baseline steps.
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}

---
# ===================================================================
# STAGING PROFILE (Active when spring.profiles.active=staging)
# ===================================================================
spring:
  config:
    activate:
      on-profile: staging

  flyway:
    # Staging requires an explicit opt-in when baselining existing DBs.
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}

---
# ===================================================================
# PRODUCTION PROFILE (Active when spring.profiles.active=prod)
# ===================================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}?prepareThreshold=0
    username: ${DB_USER}
    password: ${DB_PASS}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 60
      minimum-idle: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      keepalive-time: 30000
      auto-commit: false

  jpa:
    # SECURITY: 'validate' ensures schema matches entities without altering it.
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    # Production baseline remains explicit and controlled via env var.
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}

# SECURITY: Enforce HTTPS in production.
server:
  ssl:
    enabled: true