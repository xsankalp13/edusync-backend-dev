<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Attendance Sheet</title>
    <style>
        body { font-family: Arial, sans-serif; font-size: 12px; color: #111827; }
        h1 { font-size: 20px; margin: 0 0 8px 0; }
        .meta { margin-bottom: 12px; }
        .meta div { margin: 2px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th, td { border: 1px solid #d1d5db; padding: 6px; text-align: left; }
        th { background: #f3f4f6; }
        .summary { margin-top: 12px; font-weight: bold; }
        .signature { margin-top: 26px; }
    </style>
</head>
<body>
<h1>Daily Attendance Sheet</h1>
<div class="meta">
    <div><strong>Date:</strong> <span th:text="${date}">2026-04-06</span></div>
    <div><strong>Class:</strong> <span th:text="${className}">Class 10</span> - <span th:text="${sectionName}">A</span></div>
    <div><strong>Teacher:</strong> <span th:text="${teacherName}">Teacher</span></div>
</div>

<table>
    <thead>
    <tr>
        <th style="width: 15%;">Roll No</th>
        <th style="width: 55%;">Student Name</th>
        <th style="width: 30%;">Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${rows}">
        <td th:text="${row.rollNumber}">1</td>
        <td th:text="${row.name}">Student</td>
        <td th:text="${row.status}">PRESENT</td>
    </tr>
    </tbody>
</table>

<div class="summary">
    <div>Total Students: <span th:text="${totalCount}">0</span></div>
    <div>Present: <span th:text="${presentCount}">0</span> | Absent: <span th:text="${absentCount}">0</span> | Late: <span th:text="${lateCount}">0</span></div>
</div>

<div class="signature">Teacher Signature: ____________________</div>
</body>
</html>
