spring:
  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379
  cache:
    type: redis

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

management:
  tracing:
    sampling:
      probability: 0.0

