# =============================================================
# CI/CD Pipeline — edusync backend
#
# Triggers : every push to `main`
# Jobs     : test → build & push image → deploy to EC2
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GHCR_TOKEN          Personal Access Token with `write:packages`
#   EC2_HOST            Public IP or DNS of the EC2 instance
#   EC2_USER            SSH user (e.g. ubuntu / ec2-user)
#   EC2_SSH_KEY         Private key PEM content (the full -----BEGIN… block)
#   ENV_FILE            Full content of the production .env file
# =============================================================
name: CI/CD → EC2

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual re-runs

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/edusync-backend

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. Test
  # ─────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: edusync_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        # Use 'dev' profile — it sets ddl-auto=update and flyway.enabled=false,
        # so the CI Postgres schema is auto-created without needing migrations.
        run: ./mvnw test -q
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_URL: jdbc:postgresql://localhost:5432/edusync_test
          DB_USER: postgres
          DB_PASS: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_USERNAME: default
          REDIS_PASSWORD: ""
          JWT_SECRET_KEY: test-secret-key-minimum-32-characters-long-enough
          JWT_EXPIRATION_TIME: 3600000
          REFRESH_EXPIRATION_TIME: 86400000
          PASSWORD_RESET_TIME: 900000
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          MAIL_HOST: localhost
          MAIL_PORT: 1025
          MAIL_USERNAME: test
          MAIL_PASSWORD: test
          MAIL_FROM: test@test.com
          BASE_URL: /api/
          API_VERSION: v1
          APP_FRONTEND_URL: http://localhost:3000
          JASYPT_ENCRYPTOR_PASSWORD: test
          CLOUDINARY_CLOUD_NAME: dummy
          CLOUDINARY_API_KEY: dummy
          CLOUDINARY_API_SECRET: dummy
          SNS_ENABLED: "false"
          SUPER_ADMIN_BOOTSTRAP_REQUIRED: "false"

  # ─────────────────────────────────────────────────────────
  # 2. Build Docker image & push to GHCR
  # ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Maven cache for faster builds)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Re-use the BuildKit inline cache from the previous run
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64   # t2.medium is x86_64

  # ─────────────────────────────────────────────────────────
  # 3. Deploy to EC2 via SSH (zero-downtime rolling restart)
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    # NOTE: Remove the 'environment' gate below if you haven't created
    # a "production" environment in GitHub Settings → Environments yet.
    # environment: production

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy compose file to EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem docker-compose.prod.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/edusync/docker-compose.prod.yml

      - name: Deploy (pull latest image & restart)
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/edusync

            # Write the full .env from the secret (single source of truth)
            echo "${{ secrets.ENV_FILE }}" > .env

            # Inject the exact image tag built in this run
            echo "IMAGE_NAME=${{ env.IMAGE_NAME }}:latest" >> .env

            # Authenticate to GHCR on the EC2 host
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image first (no downtime window yet)
            docker compose -f docker-compose.prod.yml pull

            # Recreate only changed containers; keep volumes intact
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health-check to pass (max 120 s)
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' edusync-app 2>/dev/null || echo "starting")
              echo "[$i/24] Health: $STATUS"
              [ "$STATUS" = "healthy" ] && break
              sleep 5
            done

            # Fail the deploy if still not healthy
            FINAL=$(docker inspect --format='{{.State.Health.Status}}' edusync-app)
            [ "$FINAL" = "healthy" ] || (echo "App did not become healthy!" && exit 1)

            # Prune dangling images to reclaim disk space on t2.medium
            docker image prune -f
          ENDSSH

