# =============================================================
# CI/CD Pipeline — edusync backend
#
# Triggers : every push to `main`
# Jobs     : test → build & push image → deploy to EC2
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GHCR_TOKEN          Personal Access Token with `write:packages`
#   EC2_HOST            Public IP or DNS of the EC2 instance
#   EC2_USER            SSH user (e.g. ubuntu / ec2-user)
#   EC2_SSH_KEY         Private key PEM content (the full -----BEGIN… block)
#   ENV_FILE            Full content of the production .env file
# =============================================================
name: CI/CD → EC2

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual re-runs

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/edusync-backend

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. Test
  # ─────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: edusync_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        # Use 'dev' profile — it sets ddl-auto=update and flyway.enabled=false,
        # so the CI Postgres schema is auto-created without needing migrations.
        run: ./mvnw test -q
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_URL: jdbc:postgresql://localhost:5432/edusync_test
          DB_USER: postgres
          DB_PASS: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_USERNAME: default
          REDIS_PASSWORD: ""
          JWT_SECRET_KEY: test-secret-key-minimum-32-characters-long-enough
          JWT_EXPIRATION_TIME: 3600000
          REFRESH_EXPIRATION_TIME: 86400000
          PASSWORD_RESET_TIME: 900000
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          MAIL_HOST: localhost
          MAIL_PORT: 1025
          MAIL_USERNAME: test
          MAIL_PASSWORD: test
          MAIL_FROM: test@test.com
          BASE_URL: /api/
          API_VERSION: v1
          APP_FRONTEND_URL: http://localhost:3000
          JASYPT_ENCRYPTOR_PASSWORD: test
          CLOUDINARY_CLOUD_NAME: dummy
          CLOUDINARY_API_KEY: dummy
          CLOUDINARY_API_SECRET: dummy
          SNS_ENABLED: "false"
          SUPER_ADMIN_BOOTSTRAP_REQUIRED: "false"

  # ─────────────────────────────────────────────────────────
  # 2. Build Docker image & push to GHCR
  # ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Maven cache for faster builds)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Re-use the BuildKit inline cache from the previous run
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64   # t2.medium is x86_64

  # ─────────────────────────────────────────────────────────
  # 3. Deploy to EC2 via SSH (zero-downtime rolling restart)
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    # NOTE: Remove the 'environment' gate below if you haven't created
    # a "production" environment in GitHub Settings → Environments yet.
    # environment: production

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          set -euo pipefail

          HOST='${{ secrets.EC2_HOST }}'
          USER='${{ secrets.EC2_USER }}'
          KEY='${{ secrets.EC2_SSH_KEY }}'
          GHCR='${{ secrets.GHCR_TOKEN }}'

          # Required values must be present.
          [ -n "$HOST" ] || (echo "EC2_HOST secret is empty" && exit 1)
          [ -n "$USER" ] || (echo "EC2_USER secret is empty" && exit 1)
          [ -n "$KEY" ] || (echo "EC2_SSH_KEY secret is empty" && exit 1)
          [ -n "$GHCR" ] || (echo "GHCR_TOKEN secret is empty" && exit 1)

          # EC2_USER must be a single Linux username, not a key block.
          [[ "$USER" != *$'\n'* && "$USER" != *$'\r'* ]] || (echo "EC2_USER must be single-line (example: ubuntu). It currently contains newlines." && exit 1)
          [[ ! "$USER" =~ BEGIN[[:space:]].*PRIVATE[[:space:]]KEY ]] || (echo "EC2_USER appears to contain a private key. Set EC2_USER to ubuntu (or ec2-user)." && exit 1)
          [[ "$USER" =~ ^[A-Za-z0-9._-]{1,32}$ ]] || (echo "EC2_USER contains invalid characters. Expected Linux username like ubuntu or ec2-user." && exit 1)

          # EC2_HOST should be a public host/ip and single-line.
          [[ "$HOST" != *$'\n'* && "$HOST" != *$'\r'* ]] || (echo "EC2_HOST must be single-line (public IPv4 or DNS)." && exit 1)
          [[ ! "$HOST" =~ BEGIN[[:space:]].*PRIVATE[[:space:]]KEY ]] || (echo "EC2_HOST appears to contain key content. Set it to instance public IPv4/DNS." && exit 1)
          if [[ "$HOST" =~ ^10\..* ]] || [[ "$HOST" =~ ^192\.168\..* ]] || [[ "$HOST" =~ ^172\.(1[6-9]|2[0-9]|3[0-1])\..* ]]; then
            echo "EC2_HOST appears to be a private IP ($HOST). Use the instance Public IPv4/DNS in the secret."
            exit 1
          fi

          # EC2_SSH_KEY must look like a full PEM private key.
          [[ "$KEY" == *"-----BEGIN "*" PRIVATE KEY-----"* ]] || (echo "EC2_SSH_KEY is not a valid private key (missing BEGIN ... PRIVATE KEY header)." && exit 1)
          [[ "$KEY" == *"-----END "*" PRIVATE KEY-----"* ]] || (echo "EC2_SSH_KEY is not a valid private key (missing END ... PRIVATE KEY footer)." && exit 1)
          [[ "$KEY" == *$'\n'* ]] || (echo "EC2_SSH_KEY must include the full multi-line PEM content." && exit 1)

      - name: Write SSH key
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          touch ~/.ssh/known_hosts
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || \
            echo "Warning: ssh-keyscan failed; continuing with StrictHostKeyChecking=accept-new"

      - name: Validate SSH connectivity
        run: |
          set -euo pipefail

          HOST="${{ secrets.EC2_HOST }}"

          # Common misconfiguration: private VPC IP cannot be reached from GitHub-hosted runners.
          if [[ "$HOST" =~ ^10\..* ]] || [[ "$HOST" =~ ^192\.168\..* ]] || [[ "$HOST" =~ ^172\.(1[6-9]|2[0-9]|3[0-1])\..* ]]; then
            echo "EC2_HOST appears to be a private IP ($HOST). Use the instance Public IPv4/DNS in the secret."
            exit 1
          fi

          # Validate key format and prove SSH auth before SCP/Deploy steps.
          ssh-keygen -y -f ~/.ssh/ec2_key.pem >/dev/null
          ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo SSH_OK"

      - name: Copy compose file to EC2
        run: |
          scp -o StrictHostKeyChecking=accept-new -i ~/.ssh/ec2_key.pem docker-compose.prod.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/edusync/docker-compose.prod.yml

      - name: Deploy (pull latest image & restart)
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/edusync

            # Write the full .env from the secret (single source of truth)
            echo "${{ secrets.ENV_FILE }}" > .env

            # Inject the exact image tag built in this run
            echo "IMAGE_NAME=${{ env.IMAGE_NAME }}:latest" >> .env

            # Authenticate to GHCR on the EC2 host
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image first (no downtime window yet)
            docker compose -f docker-compose.prod.yml pull

            # Ensure named volumes are writable by the container's non-root user.
            PROJECT_NAME="${COMPOSE_PROJECT_NAME:-$(basename "$PWD")}"  # usually "edusync"
            APP_UID=$(docker run --rm --entrypoint sh ${{ env.IMAGE_NAME }}:latest -c 'id -u appuser')
            APP_GID=$(docker run --rm --entrypoint sh ${{ env.IMAGE_NAME }}:latest -c 'id -g appuser')
            for VOL in "${PROJECT_NAME}_logs" "${PROJECT_NAME}_uploads" "${PROJECT_NAME}_uploads_private"; do
              docker volume create "$VOL" >/dev/null
              docker run --rm -v "$VOL:/mnt" alpine:3.20 sh -c "mkdir -p /mnt && chown -R ${APP_UID}:${APP_GID} /mnt && chmod -R ug+rwX /mnt"
            done

            # Recreate only changed containers; keep volumes intact
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health-check to pass (max 300 s)
            for i in $(seq 1 60); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' edusync-app 2>/dev/null || echo "starting")
              echo "[$i/60] Health: $STATUS"
              [ "$STATUS" = "healthy" ] && break
              sleep 5
            done

            # Fail the deploy if still not healthy
            FINAL=$(docker inspect --format='{{.State.Health.Status}}' edusync-app)
            if [ "$FINAL" != "healthy" ]; then
              echo "App did not become healthy. Dumping diagnostics..."
              docker ps -a --filter name=edusync-app
              docker inspect --format='{{json .State.Health}}' edusync-app || true
              docker logs --tail 250 edusync-app || true
              curl -fsS http://localhost:8080/actuator/health || true
              exit 1
            fi

            # Prune dangling images to reclaim disk space on t2.medium
            docker image prune -f
          ENDSSH

