name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: edusync_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and run tests
        run: ./mvnw -B -DskipTests=false clean verify
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_URL: jdbc:postgresql://localhost:5432/edusync_test
          DB_USER: postgres
          DB_PASS: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_USERNAME: default
          REDIS_PASSWORD: ""
          JWT_SECRET_KEY: test-secret-key-minimum-32-characters-long-enough
          JWT_EXPIRATION_TIME: 3600000
          REFRESH_EXPIRATION_TIME: 86400000
          PASSWORD_RESET_TIME: 900000
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          MAIL_HOST: localhost
          MAIL_PORT: 1025
          MAIL_USERNAME: test
          MAIL_PASSWORD: test
          MAIL_FROM: test@test.com
          BASE_URL: /api/
          API_VERSION: v1
          APP_FRONTEND_URL: http://localhost:3000
          JASYPT_ENCRYPTOR_PASSWORD: test
          CLOUDINARY_CLOUD_NAME: dummy
          CLOUDINARY_API_KEY: dummy
          CLOUDINARY_API_SECRET: dummy
          SNS_ENABLED: "false"
          SUPER_ADMIN_BOOTSTRAP_REQUIRED: "false"
          SUPER_ADMIN_USERNAME: dummy
          SUPER_ADMIN_PASSWORD: dummy

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: target/surefire-reports/**

      - name: Upload jacoco report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
